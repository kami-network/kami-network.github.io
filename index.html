<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KamiNetwork | Твоя защищенная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #6b46ff;
            --bg: #05070a;
            --card-bg: rgba(22, 27, 34, 0.6);
            --text: #ffffff;
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(107, 70, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.15) 0%, transparent 40%);
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            gap: 60px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-content { flex: 1.2; }

        .hero-content h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 25px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.25rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            max-width: 550px;
        }

        /* Download Box - Glassmorphism */
        .download-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(107, 70, 255, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }

        .os-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .os-option {
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .os-option i { font-size: 1.8rem; margin-bottom: 8px; }
        .os-option:hover { opacity: 1; color: var(--text); }
        .os-option.active { opacity: 1; color: var(--primary); transform: scale(1.1); }

        /* Right Side - Screenshot */
        .hero-visual {
            flex: 1;
            position: relative;
        }

        .screenshot-frame {
            width: 100%;
            max-width: 650px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
            transform: perspective(1200px) rotateY(-10deg) rotateX(5deg);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero-visual::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        .screenshot-frame:hover {
            transform: perspective(1200px) rotateY(0deg) rotateX(0deg) scale(1.05);
        }

        .visual-caption {
            margin-top: 25px;
            color: var(--text-dim);
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        @media (max-width: 968px) {
            .hero { flex-direction: column; text-align: center; padding-top: 140px; padding-bottom: 60px; }
            .hero-content h1 { font-size: 2.8rem; }
            .hero-content p { margin: 0 auto 40px; }
            .screenshot-frame { transform: none !important; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">KamiNetwork</div>
    <nav>
        <a href="https://github.com/rconcoder/Kami-net-work-install-server" target="_blank" style="color: white; text-decoration: none; font-size: 1.2rem; opacity: 0.7; transition: 0.3s;"><i class="fab fa-github"></i></a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Играй с друзьями<br>с Kami!</h1>
        <p>Создавай виртуальные комнаты для игр и работы. Безопасно, как в локальной сети, быстро, как молния.</p>

        <div class="download-box">
            <a href="https://github.com/rconcoder/Kami-net-work-install-server/releases/download/1.0/InstallerKami_x64.exe" id="download-link" class="btn-main" download>
                <i class="fas fa-download"></i>
                <span id="btn-text">Скачать для Windows (.exe)</span>
            </a>

            <div class="os-selector">
                <div class="os-option active" onclick="updateOS('win', '.exe')">
                    <i class="fab fa-windows"></i><span>Windows</span>
                </div>
                <div class="os-option" onclick="updateOS('mac', '.dmg')">
                    <i class="fab fa-apple"></i><span>macOS</span>
                </div>
                <div class="os-option" onclick="updateOS('linux', '.deb')">
                    <i class="fab fa-linux"></i><span>Linux</span>
                </div>
            </div>
        </div>
    </div>

    <div class="hero-visual">
        <img src="https://i.ibb.co/twZQD7L1/photo-2026-05-07-17-29-48.jpg" alt="KamiNetwork UI" class="screenshot-frame">
        <p class="visual-caption">Лучший выбор для игры в Minecraft и другие... <i class="fas fa-bolt" style="color: var(--primary);"></i></p>
    </div>
</section>

<script>
    function updateOS(os, extension) {
        const btnText = document.getElementById('btn-text');
        const downloadLink = document.getElementById('download-link');

        const osNames = { 'win': 'Windows', 'mac': 'macOS', 'linux': 'Linux' };
        btnText.style.opacity = 0;

        setTimeout(() => {
            btnText.innerText = `Скачать для ${osNames[os]} (${extension})`;
            btnText.style.opacity = 1;
        }, 150);

        let finalUrl = "#";
        if (os === 'win') {
            finalUrl = "https://github.com/rconcoder/Kami-net-work-install-server/releases/download/1.0/InstallerKami_x64.exe";
        } else if (os === 'mac') {
            finalUrl = "https://github.com/rconcoder/Kami-net-work-install-server/releases/download/1.0/KamiNetwork_Mac.dmg";
        } else if (os === 'linux') {
            finalUrl = "https://github.com/rconcoder/Kami-net-work-install-server/releases/download/1.0/kaminetwork_linux.deb";
        }

        downloadLink.href = finalUrl;

        // Переключение активного класса
        document.querySelectorAll('.os-option').forEach(opt => opt.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
